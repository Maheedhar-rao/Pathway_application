<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sales Rep Links — Pathway Catalyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --success: #34d399;
      --border: rgba(148,163,184,.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 0%, rgba(96,165,250,.22), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(52,211,153,.16), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 30px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .rep-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(148,163,184,.1);
      gap: 16px;
    }

    .rep-item:last-child {
      border-bottom: none;
    }

    .rep-info {
      flex: 1;
    }

    .rep-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .rep-email {
      color: var(--muted);
      font-size: 13px;
    }

    .rep-link {
      flex: 2;
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(148,163,184,.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--primary);
      word-break: break-all;
      font-family: monospace;
    }

    .copy-btn {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: transform .1s, box-shadow .2s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(37,99,235,.3);
    }

    .copy-btn.copied {
      background: linear-gradient(135deg, #059669, #34d399);
    }

    .icon-btn {
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(148,163,184,.2);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all .15s;
    }
    .icon-btn:hover {
      color: var(--text);
      border-color: rgba(148,163,184,.4);
    }
    .icon-btn.danger:hover {
      color: #fca5a5;
      border-color: rgba(248,113,113,.4);
    }

    .rep-item.inactive {
      opacity: .55;
    }
    .rep-item.inactive .rep-name::after {
      content: " (inactive)";
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
    }

    .actions {
      display: inline-flex;
      gap: 6px;
    }

    .new-rep {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(148,163,184,.1);
      display: grid;
      grid-template-columns: 1fr 1.4fr 1.6fr auto;
      gap: 10px;
      align-items: center;
    }
    .new-rep input {
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(148,163,184,.2);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .new-rep input:focus {
      outline: none;
      border-color: rgba(96,165,250,.5);
    }
    .new-rep .copy-btn {
      padding: 9px 14px;
    }

    .form-error {
      grid-column: 1 / -1;
      color: #fca5a5;
      font-size: 12px;
      margin-top: -4px;
    }

    .edit-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      flex: 2;
    }
    .edit-fields input {
      background: rgba(15,23,42,.55);
      border: 1px solid rgba(148,163,184,.2);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      min-width: 0;
    }
    .edit-fields input:focus {
      outline: none;
      border-color: rgba(96,165,250,.5);
    }

    @media (max-width: 700px) {
      .edit-fields { grid-template-columns: 1fr; }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .rep-item {
        flex-direction: column;
        align-items: stretch;
      }
      .stats {
        grid-template-columns: 1fr;
      }
      .new-rep {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Dashboard
    </a>

    <h1>Sales Rep Links</h1>
    <p class="subtitle">Each rep has a unique link to track their referrals</p>

    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalReps">-</div>
        <div class="stat-label">Total Reps</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalSubmissions">-</div>
        <div class="stat-label">Total Submissions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="todaySubmissions">-</div>
        <div class="stat-label">Today</div>
      </div>
    </div>

    <div class="card" id="repList">
      <div style="padding: 40px; text-align: center; color: var(--muted);">Loading...</div>
    </div>
  </div>

  <script>
    let csrfToken = '';
    let editingCode = null;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    async function fetchCsrfToken() {
      try {
        const res = await fetch('/api/csrf-token');
        const data = await res.json();
        csrfToken = data.token || '';
      } catch (err) {
        console.error('Failed to fetch CSRF token:', err);
      }
    }

    async function apiWrite(path, method, body) {
      const res = await fetch(path, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      let data = null;
      try { data = await res.json(); } catch {}
      if (!res.ok) {
        throw new Error((data && data.error) || `Request failed (${res.status})`);
      }
      return data;
    }

    async function loadReps() {
      try {
        const res = await fetch('/api/reps');
        const reps = await res.json();

        const active = reps.filter(r => r.active);
        document.getElementById('totalReps').textContent = active.length;

        const container = document.getElementById('repList');
        container.innerHTML = `
          <div class="new-rep">
            <input id="newRepCode" type="text" placeholder="code (e.g. alex)" autocomplete="off" />
            <input id="newRepName" type="text" placeholder="Name" autocomplete="off" />
            <input id="newRepEmail" type="email" placeholder="email@pathwaycatalyst.com" autocomplete="off" />
            <button class="copy-btn" id="addRepBtn">+ Add Rep</button>
            <div class="form-error" id="newRepError" style="display:none"></div>
          </div>
          ${reps.map(rep => repRowHtml(rep)).join('')}
        `;

        document.getElementById('addRepBtn').addEventListener('click', onAddRep);
        document.getElementById('newRepCode').addEventListener('keydown', e => { if (e.key === 'Enter') onAddRep(); });
        document.getElementById('newRepName').addEventListener('keydown', e => { if (e.key === 'Enter') onAddRep(); });
        document.getElementById('newRepEmail').addEventListener('keydown', e => { if (e.key === 'Enter') onAddRep(); });

      } catch (err) {
        console.error('Failed to load reps:', err);
      }
    }

    function repRowHtml(rep) {
      const c = escapeHtml(rep.code);
      if (editingCode === rep.code) {
        return `
          <div class="rep-item${rep.active ? '' : ' inactive'}">
            <div class="rep-info">
              <div class="rep-name">${escapeHtml(rep.name)}</div>
              <div class="rep-email" style="font-family:monospace">${c}</div>
            </div>
            <div class="edit-fields">
              <input id="edit-name-${c}" type="text" value="${escapeHtml(rep.name)}" />
              <input id="edit-email-${c}" type="email" value="${escapeHtml(rep.email)}" />
            </div>
            <div class="actions">
              <button class="copy-btn" onclick="saveEdit('${c}')">Save</button>
              <button class="icon-btn" onclick="cancelEdit()">Cancel</button>
            </div>
          </div>
        `;
      }
      const deactivateBtn = rep.active
        ? `<button class="icon-btn danger" onclick="deactivateRep('${c}', '${escapeHtml(rep.name)}')">Deactivate</button>`
        : '';
      return `
        <div class="rep-item${rep.active ? '' : ' inactive'}">
          <div class="rep-info">
            <div class="rep-name">${escapeHtml(rep.name)}</div>
            <div class="rep-email">${escapeHtml(rep.email)}</div>
          </div>
          <div class="rep-link" id="link-${c}">${escapeHtml(rep.link)}</div>
          <div class="actions">
            <button class="copy-btn" onclick="copyLink('${c}', this)">Copy Link</button>
            <button class="icon-btn" onclick="startEdit('${c}')">Edit</button>
            ${deactivateBtn}
          </div>
        </div>
      `;
    }

    function startEdit(code) {
      editingCode = code;
      loadReps();
    }

    function cancelEdit() {
      editingCode = null;
      loadReps();
    }

    async function saveEdit(code) {
      const name = document.getElementById(`edit-name-${code}`).value.trim();
      const email = document.getElementById(`edit-email-${code}`).value.trim();
      try {
        await apiWrite(`/api/reps/${encodeURIComponent(code)}`, 'PATCH', { name, email });
        editingCode = null;
        await loadReps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deactivateRep(code, name) {
      if (!confirm(`Deactivate ${name}? Their link will stop working but historical submissions stay attributed to them.`)) return;
      try {
        await apiWrite(`/api/reps/${encodeURIComponent(code)}`, 'DELETE');
        await loadReps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function onAddRep() {
      const codeEl = document.getElementById('newRepCode');
      const nameEl = document.getElementById('newRepName');
      const emailEl = document.getElementById('newRepEmail');
      const errEl = document.getElementById('newRepError');
      errEl.style.display = 'none';

      const code = codeEl.value.trim().toLowerCase();
      const name = nameEl.value.trim();
      const email = emailEl.value.trim();
      if (!code || !name || !email) {
        errEl.textContent = 'Code, name, and email are required.';
        errEl.style.display = 'block';
        return;
      }
      try {
        await apiWrite('/api/reps', 'POST', { code, name, email });
        codeEl.value = nameEl.value = emailEl.value = '';
        await loadReps();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/submissions?limit=1000');
        const data = await res.json();
        const rows = (data && data.rows) || [];
        const total = (data && data.total) || rows.length;

        document.getElementById('totalSubmissions').textContent = total;

        // Count today's submissions
        const today = new Date().toDateString();
        const todayCount = rows.filter(s =>
          new Date(s.created_at).toDateString() === today
        ).length;
        document.getElementById('todaySubmissions').textContent = todayCount;

      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    function copyLink(code, btn) {
      const linkEl = document.getElementById(`link-${code}`);
      navigator.clipboard.writeText(linkEl.textContent).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Link';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    (async () => {
      await fetchCsrfToken();
      loadReps();
      loadStats();
    })();
  </script>
</body>
</html>
